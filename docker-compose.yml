version: "3.9"

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: gymflow
      POSTGRES_USER: gymflow
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gymflow -d gymflow"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
