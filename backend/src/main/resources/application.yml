server:
  port: 8080

gymflow:
  test-support:
    enabled: ${GYMFLOW_TEST_SUPPORT_ENABLED:false}

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/gymflow}
    username: ${DB_USER:gymflow}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

---
spring:
  config:
    activate:
      on-profile: dev

logging:
  level:
    com.gymflow: DEBUG
