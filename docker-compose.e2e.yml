name: gympulse-e2e

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: gymflow
      POSTGRES_USER: gymflow
      POSTGRES_PASSWORD: secret
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gymflow -d gymflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    image: gymflow-backend:e2e
    ports:
      - "8081:8080"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/gymflow_e2e
      DB_USER: gymflow
      DB_PASSWORD: secret
      JWT_SECRET: replace-with-a-strong-secret-key!
      JWT_EXPIRY_MS: 86400000
      GYMFLOW_TEST_SUPPORT_ENABLED: "true"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    image: gymflow-frontend:e2e
    ports:
      - "3001:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6

  playwright:
    image: mcr.microsoft.com/playwright:v1.58.2-jammy
    working_dir: /work
    shm_size: "1gb"
    environment:
      E2E_API_BASE: http://backend:8080/api/v1
      E2E_BASE_URL: http://frontend:80
    volumes:
      - ./frontend:/work
      - playwright_node_modules:/work/node_modules
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-lc", "npm ci && npm run test:e2e"]

volumes:
  postgres_data:
  playwright_node_modules:
