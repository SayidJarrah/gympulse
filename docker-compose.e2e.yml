name: gympulse-e2e

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: gymflow_e2e
      POSTGRES_USER: gymflow
      POSTGRES_PASSWORD: secret
    ports:
      - "5433:5432"
    volumes:
      - pg_e2e_data:/var/lib/postgresql/data
      # Note: e2e-seed/baseline.sql is NOT auto-applied.
      # Postgres init scripts run before Flyway creates the schema, so baseline inserts
      # would fail. The single onboarding-happy-path spec does not need baseline data.
      # A future multi-scenario PR will wire up a post-Flyway application mechanism.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gymflow -d gymflow_e2e"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    image: gymflow-backend:e2e
    ports:
      - "8081:8080"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/gymflow_e2e
      DB_USER: gymflow
      DB_PASSWORD: secret
      JWT_SECRET: replace-with-a-strong-secret-key!
      JWT_EXPIRY_MS: 86400000
      GYMFLOW_TEST_SUPPORT_ENABLED: "true"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    image: gymflow-frontend:e2e
    ports:
      - "5174:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6

volumes:
  pg_e2e_data:
