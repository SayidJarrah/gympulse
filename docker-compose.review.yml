name: gympulse

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: gymflow
      POSTGRES_USER: gymflow
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gymflow -d gymflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    image: gymflow-backend:review
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/gymflow
      DB_USER: gymflow
      DB_PASSWORD: secret
      JWT_SECRET: replace-with-a-strong-secret-key!
      JWT_EXPIRY_MS: 86400000
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    image: gymflow-frontend:review
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6

volumes:
  postgres_data:
