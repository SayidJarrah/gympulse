name: gympulse

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: gymflow
      POSTGRES_USER: gymflow
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gymflow -d gymflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    image: gymflow-backend:review
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/gymflow
      DB_USER: gymflow
      DB_PASSWORD: secret
      JWT_SECRET: replace-with-a-strong-secret-key!
      JWT_EXPIRY_MS: 86400000
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    image: gymflow-frontend:review
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6

  demo-seeder:
    build:
      context: ./demo-seeder
    ports:
      - "3002:3001"
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: gymflow
      DB_USER: gymflow
      DB_PASSWORD: secret
      GYMFLOW_API_URL: http://backend:8080/api/v1
      DATA_DIR: /app/data
      DEMO_PASSWORD: Demo@12345
      ADMIN_TOKEN: review-admin-token
    volumes:
      - demo_seeder_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6

volumes:
  postgres_data:
  demo_seeder_data:
