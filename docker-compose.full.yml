version: "3.9"

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: gymflow
      POSTGRES_USER: gymflow
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gymflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: gymflow-backend:local
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/gymflow
      DB_USER: gymflow
      DB_PASSWORD: secret
      JWT_SECRET: replace-with-a-strong-secret-key!
      JWT_EXPIRY_MS: 86400000
      GYMFLOW_TEST_SUPPORT_ENABLED: "true"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: gymflow-frontend:local
    ports:
      - "3000:80"
    depends_on:
      - backend

  playwright:
    image: mcr.microsoft.com/playwright:v1.58.2-jammy
    working_dir: /work
    shm_size: "1gb"
    environment:
      E2E_API_BASE: http://backend:8080/api/v1
      E2E_BASE_URL: http://frontend:80
    volumes:
      - ./frontend:/work
      - playwright_node_modules:/work/node_modules
    depends_on:
      - backend
      - frontend
    entrypoint: ["/bin/sh", "-lc", "npm ci && npm run test:e2e"]

volumes:
  postgres_data:
  playwright_node_modules:
